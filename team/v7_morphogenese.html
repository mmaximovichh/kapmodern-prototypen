<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KAPmodern Prototyp v7: Morphogenese</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background:#ece5d8; }
  #c { display:block; position:fixed; inset:0; touch-action:none; cursor:crosshair; }
  #grain { position:fixed; inset:0; pointer-events:none; opacity:.07; z-index:2; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  #status { position:fixed; top:14px; left:16px; z-index:4; color:rgba(40,38,44,.5); font-size:14px; letter-spacing:.4px; }
  #hint { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:rgba(40,38,44,.5); font-size:22px; pointer-events:none; transition:opacity .8s ease; z-index:3; text-align:center; padding:0 24px; }
  #hint.gone { opacity:0; }
  #ui { position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; padding:8px 10px; z-index:5;
    background:rgba(240,236,226,.85); border:1px solid rgba(40,38,44,.16);
    border-radius:14px; backdrop-filter:blur(6px); flex-wrap:wrap; justify-content:center; max-width:94vw; }
  #ui button, #ui .lbl { color:#2a282e; background:rgba(40,38,44,.05);
    border:1px solid rgba(40,38,44,.18); border-radius:9px; padding:8px 12px;
    font-size:13px; cursor:pointer; transition:background .15s, border-color .15s; user-select:none; }
  #ui button:hover { background:rgba(40,38,44,.12); }
  #ui button.danger { background:rgba(150,40,40,.12); border-color:rgba(150,40,40,.4); color:#7a1f1f; }
  #ui .lbl { cursor:default; display:flex; align-items:center; gap:8px; }
  #ui input[type=range] { width:120px; accent-color:#3a3740; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="grain"></div>
<div id="status">ruht</div>
<div id="hint">Zeichne einen Strich. Er beginnt, sich zu falten und zu wuchern.</div>
<div id="ui">
  <div class="lbl">Wachstum <input id="slSpeed" type="range" min="0" max="100" value="46"></div>
  <div class="lbl">Faltung <input id="slFold" type="range" min="0" max="100" value="50"></div>
  <button id="btnPlug" class="danger">Stecker ziehen</button>
  <button id="btnClear">Leeren</button>
  <button id="btnFull">Vollbild</button>
</div>
<script>
"use strict";
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR; const PAPER=[236,229,216];

function paintPaper(){ ctx.fillStyle='rgb('+PAPER.join(',')+')'; ctx.fillRect(0,0,W,H); }
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // Bei Groessenaenderung Papier neu setzen (bereits Gewachsenes geht dabei verloren, akzeptabel).
  paintPaper();
}
window.addEventListener('resize',resize); resize();

// ==================================================================
//  Zustand
// ==================================================================
// Die lebende Linie ist eine Punktkette. Jeder Punkt: {x,y,px,py,seed}
// px,py = vorige Position (fuer den Graphit-Nachzug, damit Dichte entsteht).
let line=[];            // aktive, wachsende Linie
let power=true;         // Stecker: an = waechst
let drawing=false;      // gerade zieht die Hand einen Strich
let rawStroke=null;     // roher Handstrich waehrend des Zeichnens
let lastPt=null;
let seedGrowth=false;   // erst nach dem ersten Strich beginnt das Leben

// Regler
let speed=0.46;         // Wachstumstempo (0..1)
let fold=0.50;          // Faltungs-Dichte -> Abstossungsradius (0..1)

// Simulationskonstanten
const CAP=2600;                 // Punkt-Deckel
const SEG_MIN=6.0;              // gewuenschter Punktabstand (Zielabstand)
const SEG_MAX=11.0;            // ueber diesem Abstand wird ein Punkt eingefuegt
const BORDER=34;               // Rand, den die Linie nicht ueberschreitet

// ==================================================================
//  Raster fuer schnelle Nachbarsuche (spatial hash)
// ==================================================================
let grid=new Map();
let cellSize=24;
function keyFor(cx,cy){ return cx+'|'+cy; }
function rebuildGrid(radius){
  cellSize=Math.max(12, radius);          // Zellengroesse = Abstossungsradius
  grid.clear();
  for(let i=0;i<line.length;i++){
    const p=line[i];
    const cx=Math.floor(p.x/cellSize), cy=Math.floor(p.y/cellSize);
    const k=keyFor(cx,cy);
    let bucket=grid.get(k);
    if(!bucket){ bucket=[]; grid.set(k,bucket); }
    bucket.push(i);
  }
}

// ==================================================================
//  Graphit-Rendering
// ==================================================================
// Ein kurzes, koerniges Segment zwischen zwei Punkten. Mehrere halbtransparente
// Durchgaenge mit leichtem Versatz erzeugen das Bleistift-Grizzel.
function graphite(x0,y0,x1,y1,w,alpha,tone){
  const col = tone ? '60,56,66' : '44,41,44';
  ctx.strokeStyle='rgba('+col+','+alpha+')';
  ctx.lineWidth=w;
  ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
}

// Zeichnet die Bewegung der Linie: fuer jeden Punkt einen kurzen Strich von
// seiner vorigen zu seiner neuen Position. So bleibt eine Graphit-Spur stehen,
// die sich mit der Zeit zu einem dichten, organischen Labyrinth verdichtet.
function drawMotion(){
  ctx.lineCap='round';
  for(let i=0;i<line.length;i++){
    const p=line[i];
    const dx=p.x-p.px, dy=p.y-p.py;
    const d2=dx*dx+dy*dy;
    if(d2<0.02) continue;                 // steht still -> keine Spur
    // zwei Durchgaenge, leichter Querversatz senkrecht zur Bewegung
    const d=Math.sqrt(d2)||1, nx=-dy/d, ny=dx/d;
    const j=(0.4+Math.random()*0.5);
    graphite(p.px, p.py, p.x, p.y, 0.8, 0.10, 0);
    graphite(p.px+nx*j, p.py+ny*j, p.x+nx*j, p.y+ny*j, 0.6, 0.06, 1);
  }
}

// Zeichnet die aktuelle Front der Linie als etwas dunkleren, klaren Strich,
// damit die lebende Kante praesent bleibt, waehrend der Rumpf verblasst.
function drawFront(){
  if(line.length<2) return;
  ctx.strokeStyle='rgba(40,37,42,0.16)';
  ctx.lineWidth=1.1;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(line[0].x,line[0].y);
  for(let i=1;i<line.length;i++) ctx.lineTo(line[i].x,line[i].y);
  ctx.stroke();
}

// ==================================================================
//  Differenzielles Wachstum (ein Simulationsschritt)
// ==================================================================
function grow(){
  const n=line.length;
  if(n<2) return;

  // Abstossungsradius aus dem Faltungs-Regler: mehr Faltung = groesserer Radius
  const repRadius = 9 + fold*22;          // ~9..31 px
  const repR2 = repRadius*repRadius;
  rebuildGrid(repRadius);

  // Kraefte sammeln (Ansammlung, dann einmal anwenden)
  const fx=new Float32Array(n), fy=new Float32Array(n);

  // 1) Zusammenhalt: jeder Punkt zieht sanft zu seinen beiden Kettennachbarn
  const attract=0.14;
  for(let i=0;i<n;i++){
    const p=line[i];
    const a=line[i>0?i-1:i], b=line[i<n-1?i+1:i];
    // Zug zum Mittelpunkt der Nachbarn (haelt die Kette glatt und gebunden)
    const mx=(a.x+b.x)*0.5, my=(a.y+b.y)*0.5;
    fx[i]+=(mx-p.x)*attract;
    fy[i]+=(my-p.y)*attract;
  }

  // 2) Selbstvermeidung: nahe, aber nicht direkt benachbarte Punkte stossen sich ab.
  //    Nur die 9 umliegenden Rasterzellen pruefen -> nahezu O(n).
  const repel=0.72;
  for(let i=0;i<n;i++){
    const p=line[i];
    const cx=Math.floor(p.x/cellSize), cy=Math.floor(p.y/cellSize);
    for(let gx=cx-1; gx<=cx+1; gx++){
      for(let gy=cy-1; gy<=cy+1; gy++){
        const bucket=grid.get(keyFor(gx,gy));
        if(!bucket) continue;
        for(let bi=0; bi<bucket.length; bi++){
          const j=bucket[bi];
          if(j===i) continue;
          // direkte Kettennachbarn ueberspringen (die regelt die Anziehung)
          const dd=Math.abs(j-i);
          if(dd===1) continue;
          const q=line[j];
          let ddx=p.x-q.x, ddy=p.y-q.y;
          let d2=ddx*ddx+ddy*ddy;
          if(d2>repR2 || d2<1e-6) continue;
          const d=Math.sqrt(d2);
          // weiche Abstossung: stark im Nahbereich, sanft auslaufend zum Radius
          const f=(1 - d/repRadius);
          const s=(f*f)*repel / d;
          fx[i]+=ddx*s;
          fy[i]+=ddy*s;
        }
      }
    }
  }

  // 3) Kraefte anwenden. px,py merken (fuer die Graphit-Spur), dann bewegen.
  //    Bewegung ist bewusst klein und geglaettet -> langsam, ruhig, mesmerisierend.
  const move = 0.5 + speed*1.3;           // Schrittfaktor aus Wachstums-Regler
  for(let i=0;i<n;i++){
    const p=line[i];
    p.px=p.x; p.py=p.y;
    let vx=fx[i]*move, vy=fy[i]*move;
    // Schritt deckeln, damit nichts zappelt oder explodiert
    const mag=Math.hypot(vx,vy), maxStep=2.2;
    if(mag>maxStep){ vx=vx/mag*maxStep; vy=vy/mag*maxStep; }
    p.x+=vx; p.y+=vy;
    // Rand weich abfangen
    if(p.x<BORDER){ p.x=BORDER; } else if(p.x>W-BORDER){ p.x=W-BORDER; }
    if(p.y<BORDER){ p.y=BORDER; } else if(p.y>H-BORDER){ p.y=H-BORDER; }
  }

  // 4) Wachstum: wo Segmente zu lang werden, neue Punkte einfuegen.
  //    Zusaetzlich ein wenig aktives Wachstum (kleine Auslenkung), damit die
  //    Linie laenger wird und sich neue Falten bilden koennen.
  insertPoints();
}

// Fuegt Punkte ein, wo der Abstand zu gross ist. Neue Punkte erben die
// Vorgaenger-Position, damit keine Sprung-Spur entsteht.
function insertPoints(){
  if(line.length>=CAP) return;
  const out=[];
  const growthChance = 0.02 + speed*0.06; // treibt die Gesamtlaenge langsam nach oben
  for(let i=0;i<line.length;i++){
    const p=line[i];
    out.push(p);
    if(i<line.length-1 && out.length<CAP){
      const q=line[i+1];
      const dx=q.x-p.x, dy=q.y-p.y;
      const d=Math.hypot(dx,dy);
      // einfuegen, wenn Segment zu lang ODER (selten) aktiv wachsen
      if(d>SEG_MAX || (d>SEG_MIN && Math.random()<growthChance)){
        const mx=(p.x+q.x)*0.5, my=(p.y+q.y)*0.5;
        out.push({ x:mx, y:my, px:mx, py:my, seed:Math.random()*1000 });
      }
    }
  }
  line=out;
}

// ==================================================================
//  Hauptschleife
// ==================================================================
const statusEl=document.getElementById('status');
let acc=0, lastT=performance.now();
const STEP=1000/60;     // fester Simulationstakt

function loop(now){
  let dt=now-lastT; lastT=now;
  if(dt>100) dt=100;    // nach Tab-Wechsel nicht aufholen
  requestAnimationFrame(loop);

  if(power && seedGrowth && line.length>1){
    acc+=dt;
    // hoechstens 3 Schritte pro Frame -> Arbeit deckeln
    let steps=0;
    while(acc>=STEP && steps<3){
      grow();
      acc-=STEP; steps++;
    }
    drawMotion();
    drawFront();
    statusEl.textContent='wächst  ('+line.length+')';
  } else if(!power && line.length>1){
    statusEl.textContent='eingefroren  ('+line.length+')';
  } else {
    statusEl.textContent='ruht';
  }
}
requestAnimationFrame(loop);

// ==================================================================
//  Eingabe: Handstrich zeichnen und als Samen setzen
// ==================================================================
const hint=document.getElementById('hint');

function toLine(rawPts){
  // gleichmaessig entlang der Handgeste abtasten -> saubere Startkette
  if(rawPts.length<2) return;
  const d=[0];
  for(let i=1;i<rawPts.length;i++)
    d.push(d[i-1]+Math.hypot(rawPts[i].x-rawPts[i-1].x, rawPts[i].y-rawPts[i-1].y));
  const total=d[d.length-1]||1;
  const count=Math.max(8, Math.min(200, Math.round(total/SEG_MIN)));
  const pts=[];
  for(let k=0;k<count;k++){
    const target=total*k/(count-1);
    let i=1; while(i<d.length-1 && d[i]<target) i++;
    const t=(target-d[i-1])/((d[i]-d[i-1])||1);
    const x=rawPts[i-1].x+(rawPts[i].x-rawPts[i-1].x)*t;
    const y=rawPts[i-1].y+(rawPts[i].y-rawPts[i-1].y)*t;
    pts.push({x,y,px:x,py:y,seed:Math.random()*1000});
  }
  line=pts;
  seedGrowth=true;
}

cv.addEventListener('pointerdown',e=>{
  drawing=true; cv.setPointerCapture(e.pointerId);
  rawStroke=[{x:e.clientX,y:e.clientY}];
  lastPt={x:e.clientX,y:e.clientY};
  hint.classList.add('gone');
});
cv.addEventListener('pointermove',e=>{
  if(!drawing) return;
  const dx=e.clientX-lastPt.x, dy=e.clientY-lastPt.y;
  if(dx*dx+dy*dy>6){
    // Handstrich sofort als Bleistift zeichnen (der erste Moment soll schoen sein)
    graphite(lastPt.x,lastPt.y,e.clientX,e.clientY,2.4,0.34,0);
    graphite(lastPt.x,lastPt.y,e.clientX,e.clientY,1.2,0.14,1);
    lastPt={x:e.clientX,y:e.clientY};
    rawStroke.push(lastPt);
  }
});
function endStroke(){
  if(!drawing) return;
  drawing=false;
  if(rawStroke && rawStroke.length>1) toLine(rawStroke);
  rawStroke=null; lastPt=null;
}
cv.addEventListener('pointerup',endStroke);
cv.addEventListener('pointercancel',endStroke);

// ==================================================================
//  Bedienung
// ==================================================================
const slSpeed=document.getElementById('slSpeed'), slFold=document.getElementById('slFold'),
  btnPlug=document.getElementById('btnPlug');
slSpeed.oninput=()=>{ speed=slSpeed.value/100; };
slFold.oninput=()=>{ fold=slFold.value/100; };
btnPlug.onclick=()=>{
  power=!power;
  btnPlug.textContent=power?'Stecker ziehen':'Stecker rein';
  // im eingefrorenen Zustand ein leichter Ruck ins Kuehle: haelt das Bild
  document.body.style.filter=power?'none':'contrast(.94) brightness(.99)';
};
document.getElementById('btnClear').onclick=()=>{
  line=[]; rawStroke=null; drawing=false; seedGrowth=false; acc=0;
  paintPaper(); hint.classList.remove('gone');
};
document.getElementById('btnFull').onclick=()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
</script>
</body>
</html>
