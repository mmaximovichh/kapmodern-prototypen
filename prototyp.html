<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KAPmodern Prototyp: Strich wird lebendig</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin:0; padding:0; height:100%; background:#05060a; overflow:hidden;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  #c { display:block; position:fixed; inset:0; touch-action:none; cursor:crosshair; }
  #hint { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,.55); font-size:22px; letter-spacing:.5px; pointer-events:none;
    transition:opacity .8s ease; text-align:center; }
  #hint.gone { opacity:0; }
  #ui { position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; padding:8px 10px;
    background:rgba(12,14,22,.72); border:1px solid rgba(255,255,255,.09);
    border-radius:14px; backdrop-filter:blur(8px); z-index:10; flex-wrap:wrap; justify-content:center;
    max-width:94vw; }
  #ui button, #ui .lbl { color:#e9ecf3; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12); border-radius:9px; padding:8px 12px;
    font-size:13px; cursor:pointer; transition:background .15s, border-color .15s; user-select:none; }
  #ui button:hover { background:rgba(255,255,255,.14); }
  #ui button.on { background:rgba(90,200,255,.22); border-color:rgba(90,200,255,.5); }
  #ui button.danger { background:rgba(255,90,90,.16); border-color:rgba(255,120,120,.4); }
  #ui .lbl { cursor:default; display:flex; align-items:center; gap:8px; }
  #ui input[type=range] { width:110px; accent-color:#6cd0ff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Mal einen Strich. Dann lass los.</div>
<div id="ui">
  <button id="btnDuett" class="on">Duett: an</button>
  <div class="lbl">Energie <input id="slEnergy" type="range" min="0" max="100" value="15"></div>
  <button id="btnLehrling">Lehrling loslassen</button>
  <button id="btnPlug" class="danger">Stecker ziehen</button>
  <button id="btnClear">Leeren</button>
  <button id="btnFull">Vollbild</button>
</div>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, DPR;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle = '#05060a'; ctx.fillRect(0,0,W,H);
}
window.addEventListener('resize', resize);
resize();

// ---- Zustand ----
let strokes = [];          // lebendige Striche
let current = null;        // aktuell gezeichneter Strich
let energy = 0.15;         // 0..1 wie wild das System ist
let energyTarget = 0.15;
let lehrling = false;      // Auto-Rampe Richtung Chaos
let duett = true;          // KI antwortet auf deinen Strich
let power = true;          // Stecker drin?
let clock = 0;             // eigene Uhr, laeuft nur wenn Strom an ist
let lastT = performance.now();
const MAXSTROKES = 70;

// ---- einen Strich lebendig machen ----
function addStroke(pts, opts){
  opts = opts || {};
  const s = {
    pts: pts,
    phase: Math.random()*100,
    seed: Math.random()*1000,
    hue: (opts.hue !== undefined) ? opts.hue : 40 + Math.random()*14,   // warm = Mensch
    isAI: !!opts.isAI,
    baseW: opts.baseW || (2.4 + Math.random()*1.4),
    reveal: opts.reveal ? { start: clock, dur: opts.revealDur || 650 } : null
  };
  strokes.push(s);
  if (strokes.length > MAXSTROKES) strokes.shift();
  return s;
}

// ---- die KI-Antwort: Punktspiegelung durch die Mitte, leicht gedreht, kalte Farbe ----
function makeAIAnswer(src){
  const cx = W/2, cy = H/2;
  const rot = (Math.random()-0.5)*0.6;
  const sc  = 0.85 + Math.random()*0.35;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const pts = src.pts.map(p => {
    let x = -(p.x - cx), y = -(p.y - cy);   // spiegeln durch Mitte
    return { x: cx + (x*cos - y*sin)*sc, y: cy + (x*sin + y*cos)*sc };
  });
  const hue = 185 + Math.random()*45;       // cyan-blau = KI
  setTimeout(() => addStroke(pts, { hue, isAI:true, reveal:true, revealDur:700 }), 220);
}

// ---- Bewegung: jeder Punkt schwingt senkrecht zum Strich, dazu ein sanftes Wiegen ----
function displaced(s){
  const pts = s.pts, n = pts.length, out = [];
  const t = clock*0.001;
  const waveAmp = 2 + energy*15;
  const sway = 1 + energy*6;
  for (let i=0; i<n; i++){
    const p = pts[i];
    const a = pts[Math.max(0,i-1)], b = pts[Math.min(n-1,i+1)];
    let tx = b.x-a.x, ty = b.y-a.y;
    const tl = Math.hypot(tx,ty) || 1; tx/=tl; ty/=tl;
    const nx = -ty, ny = tx;                // Senkrechte auf den Strich
    const w = waveAmp*(
        Math.sin(t*1.3 + i*0.35 + s.phase)
      + 0.5*Math.sin(t*2.1 - i*0.20 + s.phase*1.7)
      + 0.3*Math.sin(t*0.7 + i*0.09 + s.seed)
    );
    const sx = Math.sin(t*0.40 + s.phase)*sway;
    const sy = Math.cos(t*0.33 + s.phase*1.3)*sway;
    out.push({ x: p.x + nx*w + sx, y: p.y + ny*w + sy });
  }
  return out;
}

// ---- Zeichnen: ein weicher Glow-Pass plus ein heller Kern ----
function pathThrough(pts){
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length-1; i++){
    const mx = (pts[i].x+pts[i+1].x)/2, my = (pts[i].y+pts[i+1].y)/2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
}
function drawStroke(pts, hue, alpha, width, glow){
  if (pts.length < 2) return;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.shadowBlur = glow; ctx.shadowColor = 'hsla('+hue+',95%,60%,1)';
  ctx.strokeStyle = 'hsla('+hue+',90%,62%,'+(alpha*0.9)+')';
  ctx.lineWidth = width; pathThrough(pts); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'hsla('+hue+',100%,88%,'+alpha+')';
  ctx.lineWidth = Math.max(1, width*0.4); pathThrough(pts); ctx.stroke();
}

// ---- Hauptschleife ----
function loop(now){
  const dt = now - lastT; lastT = now;
  if (power) clock += dt;

  if (lehrling) energyTarget = Math.min(1, energyTarget + dt*0.00003);
  energy += (energyTarget - energy)*0.02;

  // Nachziehen: leichtes Abdunkeln statt komplett loeschen, das gibt Lichtspuren
  ctx.fillStyle = 'rgba(5,6,10,'+(power ? 0.10 : 0.03)+')';
  ctx.fillRect(0,0,W,H);

  for (const s of strokes){
    let arr = displaced(s);
    if (s.reveal){
      const p = Math.min(1, (clock - s.reveal.start)/s.reveal.dur);
      arr = arr.slice(0, Math.max(2, Math.floor(p*arr.length)));
      if (p >= 1) s.reveal = null;
    }
    const breath = 1 + 0.25*Math.sin(clock*0.002 + s.phase);
    const width = s.baseW*breath*(1 + energy*0.8);
    drawStroke(arr, s.hue, s.isAI ? 0.9 : 0.95, width, 8 + energy*22);
  }

  // Zauberlehrling: bei hoher Energie vermehren sich die Striche von selbst
  if (power && energy > 0.55 && strokes.length < MAXSTROKES){
    if (Math.random() < (energy-0.5)*0.03){
      const src = strokes[Math.floor(Math.random()*strokes.length)];
      if (src){
        const jx = (Math.random()-0.5)*90, jy = (Math.random()-0.5)*90;
        addStroke(src.pts.map(p => ({x:p.x+jx, y:p.y+jy})),
          { hue: src.hue + (Math.random()-0.5)*35, isAI:true, reveal:true, revealDur:500, baseW: src.baseW*0.9 });
      }
    }
  }

  if (current && current.pts.length > 1) drawStroke(current.pts, 46, 1, 3.2, 14);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---- Eingabe (Maus, Finger, Stift) ----
let pressing = false;
const hint = document.getElementById('hint');
cv.addEventListener('pointerdown', e => {
  pressing = true; cv.setPointerCapture(e.pointerId);
  current = { pts: [{x:e.clientX, y:e.clientY}] };
  hint.classList.add('gone');
});
cv.addEventListener('pointermove', e => {
  if (!pressing || !current) return;
  const last = current.pts[current.pts.length-1];
  const dx = e.clientX-last.x, dy = e.clientY-last.y;
  if (dx*dx + dy*dy > 28) current.pts.push({x:e.clientX, y:e.clientY});
});
function endStroke(){
  if (!pressing) return; pressing = false;
  if (current && current.pts.length > 1){
    const s = addStroke(current.pts.slice(), { hue: 38 + Math.random()*14 });
    if (duett) makeAIAnswer(s);
  }
  current = null;
}
cv.addEventListener('pointerup', endStroke);
cv.addEventListener('pointercancel', endStroke);

// ---- Bedienung ----
const btnDuett = document.getElementById('btnDuett');
const btnLehrling = document.getElementById('btnLehrling');
const btnPlug = document.getElementById('btnPlug');
const slEnergy = document.getElementById('slEnergy');

btnDuett.onclick = () => {
  duett = !duett;
  btnDuett.textContent = 'Duett: ' + (duett ? 'an' : 'aus');
  btnDuett.classList.toggle('on', duett);
};
slEnergy.oninput = () => {
  lehrling = false; btnLehrling.classList.remove('on');
  energyTarget = slEnergy.value/100;
};
btnLehrling.onclick = () => {
  lehrling = !lehrling;
  btnLehrling.classList.toggle('on', lehrling);
};
btnPlug.onclick = () => {
  power = !power;
  btnPlug.textContent = power ? 'Stecker ziehen' : 'Stecker rein';
  document.body.style.filter = power ? 'none' : 'saturate(.3) brightness(.8)';
};
document.getElementById('btnClear').onclick = () => {
  strokes = []; current = null;
  ctx.fillStyle = '#05060a'; ctx.fillRect(0,0,W,H);
};
document.getElementById('btnFull').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
// Slider soll dem Auto-Wert folgen, wenn der Lehrling laeuft
setInterval(() => { if (lehrling) slEnergy.value = Math.round(energyTarget*100); }, 200);
</script>
</body>
</html>
