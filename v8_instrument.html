<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KAPmodern Prototyp v8: Instrument</title>
<style>
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:#ece5d8;
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif; }
  canvas{ position:fixed; inset:0; display:block; }
  #base{ z-index:1; } #live{ z-index:2; touch-action:none; cursor:crosshair; }
  #grain{ position:fixed; inset:0; pointer-events:none; opacity:.06; z-index:3; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  #hint{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:4;
    color:rgba(40,38,44,.5); font-size:21px; pointer-events:none; transition:opacity .7s; text-align:center; }
  #hint.gone{ opacity:0; }
  #tools{ position:fixed; left:16px; top:50%; transform:translateY(-50%); z-index:10;
    display:flex; flex-direction:column; gap:7px; }
  #tools button{ display:flex; align-items:center; gap:8px; width:130px; text-align:left;
    background:rgba(240,236,226,.82); border:1px solid rgba(40,38,44,.16); color:#2a282e;
    border-radius:10px; padding:9px 11px; font-size:13px; cursor:pointer; user-select:none;
    backdrop-filter:blur(6px); transition:background .12s,border-color .12s; }
  #tools button:hover{ background:rgba(240,236,226,.95); }
  #tools button.on{ background:#2c292c; color:#ece5d8; border-color:#2c292c; }
  #tools .key{ margin-left:auto; opacity:.5; font-size:11px; border:1px solid currentColor; border-radius:4px; padding:0 5px; }
  #bar{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:10;
    display:flex; gap:8px; align-items:center; padding:8px 10px; background:rgba(240,236,226,.85);
    border:1px solid rgba(40,38,44,.16); border-radius:14px; backdrop-filter:blur(6px); flex-wrap:wrap; justify-content:center; }
  #bar button,#bar .lbl{ color:#2a282e; background:rgba(40,38,44,.05); border:1px solid rgba(40,38,44,.18);
    border-radius:9px; padding:8px 12px; font-size:13px; cursor:pointer; user-select:none; }
  #bar button:hover{ background:rgba(40,38,44,.12); }
  #bar button.danger{ background:rgba(150,40,40,.12); border-color:rgba(150,40,40,.4); color:#7a1f1f; }
  #bar .lbl{ cursor:default; display:flex; align-items:center; gap:8px; }
  #bar input[type=range]{ width:120px; accent-color:#3a3740; }
  #ki{ position:fixed; top:14px; right:16px; z-index:11; background:rgba(44,41,44,.87); color:#ece5d8;
    font-size:12px; letter-spacing:.4px; padding:7px 12px; border-radius:9px; max-width:46vw; line-height:1.4; }
</style>
</head>
<body>
<canvas id="base"></canvas>
<canvas id="live"></canvas>
<div id="grain"></div>
<div id="hint">Ein Instrument. Waehle links ein Werkzeug und spiele.</div>
<div id="ki" hidden></div>
<div id="tools"></div>
<div id="bar">
  <div class="lbl">Dosis <input id="slDosis" type="range" min="20" max="160" value="70"></div>
  <div class="lbl">Erwachen <input id="slWake" type="range" min="0" max="100" value="0"></div>
  <button id="btnPlug" class="danger">Stecker ziehen</button>
  <button id="btnClear">Leeren</button>
  <button id="btnFull">Vollbild</button>
</div>
<script>
const base=document.getElementById('base'), live=document.getElementById('live');
const bctx=base.getContext('2d'), lctx=live.getContext('2d');
let W,H,DPR; const PAPER=[236,229,216];
function paintPaper(){ bctx.save(); bctx.setTransform(DPR,0,0,DPR,0,0); bctx.fillStyle='rgb('+PAPER.join(',')+')'; bctx.fillRect(0,0,W,H); bctx.restore(); }
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
  for(const c of [base,live]){ c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; c.getContext('2d').setTransform(DPR,0,0,DPR,0,0); }
  paintPaper(); }
window.addEventListener('resize',resize); resize();

// ---- Zustand ----
let tool='pencil', dosis=0.7, power=true, clock=0, lastT=performance.now();
let tips=[], liveMarks=[], lastStroke=[], drawStroke=null, lastPt=null;
let particles=null, wakeLevel=0, wakeTarget=0;
const TIPCAP=140;

// ---- Hilfen ----
function n1(x){ const s=Math.sin(x*127.1)*43758.5453; return (s-Math.floor(s))-0.5; }
function noise2(x,y){ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi,u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=n1(xi+yi*57.1),b=n1(xi+1+yi*57.1),c=n1(xi+(yi+1)*57.1),d=n1(xi+1+(yi+1)*57.1); const ab=a+(b-a)*u,cd=c+(d-c)*u; return ab+(cd-ab)*v; }
function bbox(pts){ let a=1e9,b=1e9,c=-1e9,d=-1e9; for(const p of pts){ if(p.x<a)a=p.x; if(p.y<b)b=p.y; if(p.x>c)c=p.x; if(p.y>d)d=p.y; } return {minx:a,miny:b,maxx:c,maxy:d,w:c-a,h:d-b}; }

// ---- Graphit-Renderer ----
function seg(ctx,x0,y0,x1,y1,w,tone,alpha){ const col=tone?'62,58,68':'44,41,44'; ctx.lineCap='round';
  for(let p=0;p<2;p++){ const jx=(Math.random()-0.5)*w*0.6, jy=(Math.random()-0.5)*w*0.6;
    ctx.beginPath(); ctx.moveTo(x0+jx,y0+jy); ctx.lineTo(x1+jx,y1+jy);
    ctx.strokeStyle='rgba('+col+','+(alpha*(0.7+Math.random()*0.3))+')'; ctx.lineWidth=Math.max(0.4,w*(0.6+Math.random()*0.5)); ctx.stroke(); } }
function pathGriz(ctx,pts,w,tone,alpha){ for(let i=1;i<pts.length;i++) seg(ctx,pts[i-1].x,pts[i-1].y,pts[i].x,pts[i].y,w,tone,alpha); }

// ---- Werkzeug: Wachsen (kleine Triebe) ----
function addTip(x,y,dir){ if(tips.length>=TIPCAP) return; const w=(2.2+Math.random()*1.2);
  tips.push({x,y,dir,width:w,w0:w,energy:(16+Math.random()*14)*(0.5+dosis),seed:Math.random()*900,tone:0}); }
function stepTip(tp,out){ const px=tp.x,py=tp.y, speed=1.5;
  tp.dir += noise2(tp.x*0.008+tp.seed, tp.y*0.008-tp.seed)*1.5 + (Math.random()-0.5)*0.3;
  tp.x+=Math.cos(tp.dir)*speed; tp.y+=Math.sin(tp.dir)*speed; tp.width*=0.965; tp.energy--;
  seg(bctx,px,py,tp.x,tp.y, tp.width*(0.6+dosis*0.6), tp.tone, 0.12+Math.random()*0.10);
  if(tp.width>1.0 && tp.energy>4 && tips.length+out.length<TIPCAP && Math.random()<0.03){
    out.push({x:tp.x,y:tp.y,dir:tp.dir+(Math.random()<0.5?1:-1)*(0.5+Math.random()*0.5),width:tp.width*0.7,w0:tp.width*0.7,energy:tp.energy*0.6,seed:tp.seed+1,tone:tp.tone}); }
  return tp.energy>0 && tp.width>0.4 && tp.x>-20&&tp.x<W+20&&tp.y>-20&&tp.y<H+20; }

// ---- Werkzeug: Echo (eine kleine KI-Antwort pro Tipp) ----
function spawnEcho(x,y){ let pts;
  if(lastStroke.length>3){ const bb=bbox(lastStroke), cx=bb.minx+bb.w/2, cy=bb.miny+bb.h/2;
    const sc=(0.35+Math.random()*0.3)*(0.6+dosis), rot=(Math.random()-0.5)*1.6, co=Math.cos(rot), si=Math.sin(rot), flip=Math.random()<0.5?-1:1;
    pts=lastStroke.map(p=>{ const ax=(p.x-cx)*flip*sc, ay=(p.y-cy)*sc; return {x:x+ax*co-ay*si, y:y+ax*si+ay*co}; });
  } else { const steps=7+Math.floor(Math.random()*6), sg=8*dosis; let a=Math.random()*6.28,px=x,py=y; pts=[{x:px,y:py}];
    for(let i=0;i<steps;i++){ a+=(Math.random()-0.5)*0.9; px+=Math.cos(a)*sg; py+=Math.sin(a)*sg; pts.push({x:px,y:py}); } }
  liveMarks.push({pts, born:clock, dur:350+pts.length*18, tone:1}); }

// ---- Werkzeug: Wischen (Graphit verschmieren) ----
const tmp=document.createElement('canvas'), tctx=tmp.getContext('2d');
function carry(x,y,dx,dy,r){ const d=DPR, w=Math.ceil(2*r*d); if(w<2) return; const sx=Math.floor((x-r)*d), sy=Math.floor((y-r)*d);
  tmp.width=w; tmp.height=w; tctx.clearRect(0,0,w,w); tctx.drawImage(base, sx,sy,w,w, 0,0,w,w);
  tctx.globalCompositeOperation='destination-in'; const g=tctx.createRadialGradient(w/2,w/2,0,w/2,w/2,w/2);
  g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(.65,'rgba(0,0,0,.55)'); g.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=g; tctx.fillRect(0,0,w,w); tctx.globalCompositeOperation='source-over';
  bctx.save(); bctx.setTransform(1,0,0,1,0,0); bctx.globalAlpha=0.5; bctx.drawImage(tmp, 0,0,w,w, sx+dx*d*1.6, sy+dy*d*1.6, w,w); bctx.restore(); }
function smudge(x0,y0,x1,y1){ const r=14*dosis, steps=Math.max(1,Math.floor(Math.hypot(x1-x0,y1-y0)/4));
  for(let s=1;s<=steps;s++){ const f=s/steps; carry(x0+(x1-x0)*f, y0+(y1-y0)*f, (x1-x0)/steps, (y1-y0)/steps, r); } }

// ---- Werkzeug: Radierer ----
function erase(x,y){ const r=18*dosis; bctx.save(); const g=bctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba('+PAPER.join(',')+',1)'); g.addColorStop(1,'rgba('+PAPER.join(',')+',0)');
  bctx.fillStyle=g; bctx.beginPath(); bctx.arc(x,y,r,0,6.283); bctx.fill(); bctx.restore(); }

// ---- Erwachen: die ganze gezeichnete Flaeche hebt sich als lebendiges Graphit vom Papier ----
// Beim ersten Aufziehen des Reglers wird das Bild in Graphit-Partikel abgetastet (das Bild selbst bleibt erhalten).
function sampleDrawing(){ const img=bctx.getImageData(0,0,base.width,base.height), data=img.data, dw=base.width, dh=base.height;
  const step=Math.max(2,Math.round(2*DPR)), paper=236, pts=[];
  for(let y=0;y<dh;y+=step){ for(let x=0;x<dw;x+=step){ const r=data[(y*dw+x)*4], d=(paper-r)/180; if(d>0.14) pts.push({x:x/DPR,y:y/DPR,d:Math.min(1,d)}); } }
  const CAP=7000; let arr=pts; if(pts.length>CAP){ arr=[]; const pr=CAP/pts.length; for(const p of pts) if(Math.random()<pr) arr.push(p); }
  particles=arr.map(p=>({hx:p.x,hy:p.y,x:p.x,y:p.y,vx:0,vy:0,d:p.d})); }
function updateParticles(){ const t=clock*0.001;
  for(const p of particles){ const ang=noise2(p.x*0.004+7, p.y*0.004-3+t*0.03)*9.6, sp=0.9*wakeLevel*wakeLevel;
    p.vx=p.vx*0.9+Math.cos(ang)*sp; p.vy=p.vy*0.9+Math.sin(ang)*sp;
    const k=0.02+0.13*(1-wakeLevel); p.vx+=(p.hx-p.x)*k; p.vy+=(p.hy-p.y)*k; p.x+=p.vx; p.y+=p.vy; } }
function renderParticles(){ const a0=Math.min(1,wakeLevel*1.3); if(a0<=0.01) return; lctx.lineCap='round'; lctx.lineWidth=1.4;
  for(const p of particles){ const v=Math.min(1,Math.hypot(p.vx,p.vy)), al=p.d*a0*(0.55+0.45*v);
    lctx.strokeStyle='rgba(44,41,44,'+al.toFixed(3)+')'; lctx.beginPath(); lctx.moveTo(p.x-p.vx*2,p.y-p.vy*2); lctx.lineTo(p.x,p.y); lctx.stroke(); } }

// ---- Schleife ----
function loop(now){ const dt=now-lastT; lastT=now; if(power) clock+=dt;
  if(power){ if(tips.length){ const snap=tips; tips=[]; const out=[]; for(const t of snap){ if(stepTip(t,out)) tips.push(t); } for(const c of out) tips.push(c); }
    wakeLevel += (wakeTarget-wakeLevel)*0.05; if(particles) updateParticles(); }
  base.style.opacity=(1-Math.min(1,wakeLevel*1.15)).toFixed(3);
  lctx.clearRect(0,0,W,H);
  for(let i=liveMarks.length-1;i>=0;i--){ const m=liveMarks[i], p=Math.min(1,(clock-m.born)/m.dur), cnt=Math.max(2,Math.floor(p*m.pts.length));
    pathGriz(lctx, m.pts.slice(0,cnt), m.w||1.5, m.tone, 0.5);
    if(p>=1){ pathGriz(bctx, m.pts, m.w||1.5, m.tone, 0.45); liveMarks.splice(i,1); } }
  if(particles){ renderParticles(); if(wakeTarget<=0 && wakeLevel<0.02){ particles=null; base.style.opacity='1'; } }
  requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// ---- Eingabe ----
let pressing=false; const hint=document.getElementById('hint');
function pos(e){ return {x:e.clientX, y:e.clientY}; }
live.addEventListener('pointerdown', e=>{ pressing=true; live.setPointerCapture(e.pointerId); hint.classList.add('gone'); const p=pos(e); lastPt=p;
  if(tool==='pencil'){ drawStroke=[p]; }
  else if(tool==='wachsen'){ addTip(p.x,p.y,Math.random()*6.28); }
  else if(tool==='echo'){ spawnEcho(p.x,p.y); }
  else if(tool==='kistrich'){ kiStrich(p); }
  else if(tool==='kiblick'){ kiBlick(); }
  else if(tool==='radierer'){ erase(p.x,p.y); } });
live.addEventListener('pointermove', e=>{ if(!pressing) return; const p=pos(e), dx=p.x-lastPt.x, dy=p.y-lastPt.y; if(dx*dx+dy*dy<6 && tool!=='wischen') return;
  if(tool==='pencil'){ seg(bctx,lastPt.x,lastPt.y,p.x,p.y, (2.0+dosis*1.4), 0, 0.5); if(drawStroke) drawStroke.push(p); }
  else if(tool==='wachsen'){ if(dx*dx+dy*dy>200) addTip(p.x,p.y,Math.atan2(dy,dx)); }
  else if(tool==='wischen'){ smudge(lastPt.x,lastPt.y,p.x,p.y); }
  else if(tool==='radierer'){ erase(p.x,p.y); }
  lastPt=p; });
function up(){ if(!pressing) return; pressing=false; if(tool==='pencil' && drawStroke && drawStroke.length>2) lastStroke=drawStroke; drawStroke=null; }
live.addEventListener('pointerup',up); live.addEventListener('pointercancel',up);

// ---- Werkzeugleiste ----
const TOOLS=[['pencil','Bleistift','1'],['wachsen','Wachsen','2'],['echo','Echo','3'],['wischen','Wischen','4'],['radierer','Radierer','5'],['kistrich','KI-Strich','6'],['kiblick','KI-Blick','7']];
const toolsEl=document.getElementById('tools');
function selectTool(id){ tool=id; [...toolsEl.children].forEach(b=>b.classList.toggle('on', b.dataset.id===id)); }
TOOLS.forEach(([id,label,key])=>{ const b=document.createElement('button'); b.dataset.id=id;
  b.innerHTML='<span>'+label+'</span><span class="key">'+key+'</span>'; b.onclick=()=>selectTool(id); toolsEl.appendChild(b); });
selectTool('pencil');
window.addEventListener('keydown', e=>{ const t=TOOLS.find(t=>t[2]===e.key); if(t) selectTool(t[0]);
  if(e.code==='Space'){ e.preventDefault(); togglePlug(); } });

// ---- Echte KI (laeuft nur mit lokalem Server: python3 execution/kap_ki_server.py) ----
let kiOk=false, kiBusy=false, kiTimer=null;
const kiEl=document.getElementById('ki');
function kiShow(t,ms){ kiEl.hidden=false; kiEl.textContent=t; clearTimeout(kiTimer); if(ms) kiTimer=setTimeout(()=>{kiEl.hidden=true;},ms); }
fetch('api/health').then(r=>r.json()).then(j=>{ kiOk=!!(j&&j.ok); }).catch(()=>{ kiOk=false; });
function exportPng(){ const ex=document.createElement('canvas'); ex.width=1536; ex.height=1024; const x=ex.getContext('2d');
  x.fillStyle='rgb('+PAPER.join(',')+')'; x.fillRect(0,0,ex.width,ex.height);
  x.drawImage(base,0,0,base.width,base.height,0,0,ex.width,ex.height); return ex.toDataURL('image/png'); }
function kiGate(){ if(kiBusy){ return false; }
  if(!kiOk){ kiShow('Die KI-Werkzeuge laufen nur lokal: im Workspace "python3 execution/kap_ki_server.py" starten und http://localhost:8787 oeffnen.',6000); return false; }
  return true; }
async function kiStrich(p){ if(!kiGate()) return; kiBusy=true; kiShow('die Maschine schaut auf das Blatt ...');
  try{
    const r=await fetch('api/kistrich',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:exportPng(), punkt:[p.x/W, p.y/H], dosis})});
    const j=await r.json(); if(j.error) throw new Error(j.error);
    (j.striche||[]).forEach((s,si)=>{ const pts=(s.punkte||[]).map(q=>({x:q[0]*W, y:q[1]*H}));
      if(pts.length>1) setTimeout(()=>{ liveMarks.push({pts, born:clock, dur:500+pts.length*35, tone:1, w:s.breite||1.8}); }, si*400); });
    kiShow(j.gedanke||'', j.gedanke?4000:1);
  }catch(e){ kiShow('KI-Fehler: '+e.message, 6000); }
  finally{ kiBusy=false; } }
let blickImg=null, blickAlpha=0;
function fadeBlick(){ if(!blickImg) return; if(power){ blickAlpha+=0.016;
    bctx.save(); bctx.globalAlpha=0.06; bctx.drawImage(blickImg,0,0,W,H); bctx.restore(); }
  if(blickAlpha<1) requestAnimationFrame(fadeBlick); else blickImg=null; }
async function kiBlick(){ if(!kiGate()) return; kiBusy=true; kiShow('die Maschine verwandelt das Blatt (dauert etwas) ...');
  try{
    const r=await fetch('api/kiblick',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:exportPng(), qualitaet:'medium'})});
    const j=await r.json(); if(j.error) throw new Error(j.error);
    const img=new Image(); img.onload=()=>{ blickImg=img; blickAlpha=0; fadeBlick(); }; img.src=j.bild;
    kiShow('die Zeichnung der Maschine legt sich auf das Blatt', 4000);
  }catch(e){ kiShow('KI-Fehler: '+e.message, 8000); }
  finally{ kiBusy=false; } }

// ---- Bedienung ----
function togglePlug(){ power=!power; btnPlug.textContent=power?'Stecker ziehen':'Stecker rein'; document.body.style.filter=power?'none':'contrast(.93) brightness(.98)'; }
const btnPlug=document.getElementById('btnPlug');
document.getElementById('slDosis').oninput=e=>{ dosis=e.target.value/100; };
const slWake=document.getElementById('slWake');
slWake.oninput=e=>{ const v=e.target.value/100; if(v>0 && !particles) sampleDrawing(); wakeTarget=v; };
btnPlug.onclick=togglePlug;
document.getElementById('btnClear').onclick=()=>{ tips=[]; liveMarks=[]; lastStroke=[]; particles=null; wakeTarget=0; wakeLevel=0; slWake.value=0; base.style.opacity='1'; paintPaper(); lctx.clearRect(0,0,W,H); };
document.getElementById('btnFull').onclick=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
</script>
</body>
</html>
